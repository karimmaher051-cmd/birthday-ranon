<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* صفحة العد */

#countdownPage{
background:black;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#countdownPage h2{
font-size:42px;
}

#countdown{
font-size:150px;
font-weight:bold;
}

/* صفحة الشمعة */

#candlePage{
background:black;
color:white;
height:100vh;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

.candle{
font-size:180px;
filter:drop-shadow(0 0 120px orange);
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 40px orange)}
to{filter:drop-shadow(0 0 200px orange)}
}

#text{
font-size:44px;
margin-top:30px;
}

/* البالونات */

.balloon{
position:absolute;
font-size:45px;
animation:float 7s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(110vh)}
100%{transform:translateY(-120vh)}
}

/* الصفحة الأخيرة */
  
#mainPage{
display:none;
background:#ff6b6b;
min-height:100vh;
padding-top:60px;
color:white;
overflow:auto;
}

#mainPage h2{
font-size:40px;
margin-bottom:20px;
}

img{
width:90%;
max-width:450px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
cursor:pointer;
}

/* الرسالة */

#message{
font-size:34px;
line-height:1.8;
margin-top:30px;
padding:20px;
}

/* القلوب */

.heart{
position:absolute;
font-size:45px;
animation:heartFloat 6s linear forwards;
}

@keyframes heartFloat{
0%{
transform:translateY(110vh);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<!-- صفحة العد -->

<div id="countdownPage">

<h2>المفاجأة هتظهر بعد</h2>

<div id="countdown">10</div>

</div>

<!-- صفحة الشمعة -->

<div id="candlePage">

<div class="candle">🕯️</div>

<div id="text">الكتكوته اللي كبرت سنة 🐣🎉💥</div>

</div>

<!-- الصفحة الأخيرة -->

<div id="mainPage">

<h2>اضغطي علي رنون ❤️</h2>

<img src="child.jpg" onclick="showMessage()">

<div id="message"></div>

<audio id="music" src="music.mp3"></audio>

</div>

<script>

/* العد التنازلي */

let time=10;

let countdown=document.getElementById("countdown");

let timer=setInterval(()=>{

time--;

countdown.innerHTML=time;

if(time<=0){

clearInterval(timer);

document.getElementById("countdownPage").style.display="none";

document.getElementById("candlePage").style.display="flex";

/* الكونفيتي */

confetti({
particleCount:200,
spread:100,
origin:{y:0.6}
});

/* اهتزاز خفيف */

if(navigator.vibrate){
navigator.vibrate([200,100,200]);
}

/* تشغيل البالونات */

createBalloons();

}

},1000);


/* البالونات */

function createBalloons(){

for(let i=0;i<20;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML="🎈";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=(5+Math.random()*3)+"s";

document.body.appendChild(b);

}

}


/* الانتقال للصفحة الثانية */

setTimeout(()=>{

document.getElementById("candlePage").style.display="none";

document.getElementById("mainPage").style.display="block";

document.body.style.background="#ff6b6b";

},18000);


/* القلوب */

function createHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

}


/* الرسالة */

function showMessage(){

createHearts();

document.getElementById("music").play().catch(()=>{});

let text=`كل سنه وانتي طيبه يا اجمل واحن حد في حياتي ❤️

كل سنه وانتي اعظم ما رأت عيناي 🥰

بحبك اووي ❤️

Happy birthday ranon 🐣🥰🥰🥰🫶🏻😘🎊🎉`;

let i=0;

let speed=60;

let box=document.getElementById("message");

function type(){

if(i<text.length){

if(text.charAt(i)=="\n"){
box.innerHTML+="<br>";
}else{
box.innerHTML+=text.charAt(i);
}

</script>

</body>
</html>
